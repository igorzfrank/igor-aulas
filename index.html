<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hub Professor | 教師の柱</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Partículas de fundo -->
    <div class="particulas" id="particulas"></div>

    <!-- Névoas flutuantes -->
    <div class="nevoa nevoa-1"></div>
    <div class="nevoa nevoa-2"></div>
    <div class="nevoa nevoa-3"></div>

    <div class="container">
      <!-- Emblema -->
      <div class="emblema-container">
        <div class="sol-nascente">
          <div class="raios-sol" id="raiosSol"></div>
          <div class="circulo-sol"></div>
        </div>
        <span class="subtitulo-japones">教師の柱 • KYOSHI NO HASHIRA</span>
        <h1>Hub Professor</h1>
        <p class="lema">⚔️ TREINE • EVOLUA • DOMINE ⚔️</p>
      </div>

      <!-- Linha decorativa -->
      <div class="divisor-espada">
        <span class="linha"></span>
        <span class="tsuba">⚔️</span>
        <span class="padrao-espada">教</span>
        <span class="tsuba" style="animation-delay: 0.5s">📚</span>
        <span class="padrao-espada">学</span>
        <span class="tsuba" style="animation-delay: 1s">⚔️</span>
        <span class="linha"></span>
      </div>

      <!-- Subtítulo -->
      <p class="instrucao">Selecione uma matéria para iniciar o treino</p>

      <!-- Grid de cards -->
      <div class="deck">
        <a
          href="logica_de_programacao/logica_de_programacao.html"
          class="pad orange"
        >
          <span class="icone-card">🧠</span>
          <span class="titulo-card">Lógica de Programação</span>
          <span class="forma-card">壱ノ型 • Ichi no Kata</span>
        </a>
      </div>

      <!-- Rodapé -->
      <div class="rodape">
        <span class="simbolo-final">滅</span>
        <p>Destrua dúvidas. Domine o conhecimento. Code with honor.</p>
        <span class="tag-final"
          >鬼殺隊 • Divisão de Tecnologia Educacional</span
        >
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
